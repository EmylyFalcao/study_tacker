<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.28.1/fonts/tabler-icons.min.css" />
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary:  #eeede9;
      --text:         #1a1a18;
      --text-secondary: #6b6b67;
      --text-hint:    #9b9b96;
      --border:       rgba(0,0,0,0.12);
      --border-md:    rgba(0,0,0,0.22);
      --radius-md:    8px;
      --radius-lg:    12px;
      --accent:       #1a1a18;
      --accent-text:  #ffffff;
      --success-bg:   #E1F5EE;
      --success-text: #0F6E56;
      --warn-bg:      #FAEEDA;
      --warn-text:    #854F0B;
      --done-bg:      #EAF3DE;
      --done-text:    #3B6D11;
      --danger:       #993C1D;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary:  #2e2e2c;
        --text:         #f0efe9;
        --text-secondary: #9b9b96;
        --text-hint:    #6b6b67;
        --border:       rgba(255,255,255,0.10);
        --border-md:    rgba(255,255,255,0.18);
        --accent:       #f0efe9;
        --accent-text:  #1c1c1a;
        --success-bg:   #085041;
        --success-text: #9FE1CB;
        --warn-bg:      #633806;
        --warn-text:    #FAC775;
        --done-bg:      #27500A;
        --done-text:    #C0DD97;
        --danger:       #F0997B;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Layout ── */
    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.75rem;
      gap: 1rem;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 i { font-size: 20px; }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 14px;
      font-size: 13px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font);
      transition: background 0.15s;
    }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--bg-secondary); }

    /* ── Metrics ── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.75rem;
    }
    .metric {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 1rem;
    }
    .metric .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .metric .val   { font-size: 24px; font-weight: 600; color: var(--text); }
    .metric .sub   { font-size: 11px; color: var(--text-hint); margin-top: 1px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .tab {
      padding: 8px 18px;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: var(--font);
      transition: color 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

    /* ── Sections ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── Course card ── */
    .course-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
      transition: box-shadow 0.15s;
    }
    .course-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .course-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }
    .course-title { font-size: 15px; font-weight: 500; color: var(--text); }
    .course-meta  { display: flex; align-items: center; gap: 6px; margin-top: 4px; }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-active  { background: var(--success-bg); color: var(--success-text); }
    .badge-paused  { background: var(--warn-bg);    color: var(--warn-text);    }
    .badge-done    { background: var(--done-bg);    color: var(--done-text);    }

    .platform-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .progress-bar {
      flex: 1;
      height: 5px;
      background: var(--bg-secondary);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.4s ease;
    }
    .progress-pct { font-size: 12px; color: var(--text-secondary); min-width: 34px; text-align: right; }

    .modules-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .modules-row i { font-size: 13px; }

    /* ── Card footer ── */
    .course-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .course-actions { display: flex; gap: 4px; }
    .icon-btn {
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: background 0.15s, color 0.15s;
      font-size: 16px;
    }
    .icon-btn:hover { color: var(--text); background: var(--bg-secondary); }

    .deadline      { font-size: 11px; color: var(--text-secondary); }
    .deadline.soon { color: var(--danger); font-weight: 500; }

    .notes-toggle {
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      font-family: var(--font);
      padding: 0;
      transition: color 0.15s;
    }
    .notes-toggle:hover { color: var(--text); }

    .notes-box {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 0.5px solid var(--border);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: none;
      white-space: pre-wrap;
    }
    .notes-box.open { display: block; }

    .notes-edit {
      width: 100%;
      font-size: 13px;
      color: var(--text);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      padding: 8px 10px;
      background: var(--bg);
      resize: vertical;
      min-height: 70px;
      font-family: var(--font);
      margin-top: 10px;
      display: none;
    }
    .notes-edit.open { display: block; }
    .notes-save-row { display: none; margin-top: 6px; }
    .notes-save-row.open { display: flex; gap: 6px; }

    /* ── Weekly ── */
    .week-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
    }
    .week-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
    .week-sub   { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

    .week-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .week-row label { font-size: 12px; color: var(--text-secondary); }
    .week-row input[type="number"] {
      width: 72px;
      font-size: 13px;
      padding: 5px 8px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      text-align: center;
    }

    /* ── Modal ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-bg.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      width: 460px;
      max-width: 100%;
      border: 0.5px solid var(--border-md);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; color: var(--text); }

    .field       { margin-bottom: 1rem; }
    .field label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 5px; }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      font-size: 13px;
      padding: 8px 10px;
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--text-secondary);
    }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .empty i { font-size: 36px; display: block; margin-bottom: 10px; opacity: 0.35; }

    /* ── Export / Reset toolbar ── */
    .toolbar {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .field-row { grid-template-columns: 1fr; }
      .header { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div>
      <h1><i class="ti ti-book-2"></i> Study Tracker</h1>
      <p id="subtitle">Your personal learning dashboard</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">
      <i class="ti ti-plus"></i> Add course
    </button>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric">
      <div class="label">Total courses</div>
      <div class="val" id="m-total">0</div>
      <div class="sub">tracked</div>
    </div>
    <div class="metric">
      <div class="label">In progress</div>
      <div class="val" id="m-active">0</div>
      <div class="sub">active</div>
    </div>
    <div class="metric">
      <div class="label">Avg progress</div>
      <div class="val" id="m-avg">0%</div>
      <div class="sub">across all</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('courses', this)">Courses</button>
    <button class="tab" onclick="switchTab('weekly', this)">Weekly goals</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn" onclick="exportData()" title="Export your data as JSON">
      <i class="ti ti-download"></i> Export data
    </button>
    <button class="btn" onclick="importData()" title="Import a previously exported JSON file">
      <i class="ti ti-upload"></i> Import data
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)" />
  </div>

  <!-- Courses section -->
  <div id="sec-courses" class="section active">
    <div id="course-list"></div>
  </div>

  <!-- Weekly section -->
  <div id="sec-weekly" class="section">
    <div id="week-list"></div>
  </div>

</div>

<!-- Add / Edit Modal -->
<div class="modal-bg" id="modal-bg" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modal-title">Add new course</h2>

    <div class="field">
      <label>Course name</label>
      <input type="text" id="f-name" placeholder="e.g. Machine Learning Specialisation" />
    </div>

    <div class="field-row">
      <div class="field">
        <label>Platform</label>
        <select id="f-platform">
          <option>Coursera</option>
          <option>Udemy</option>
          <option>edX</option>
          <option>YouTube</option>
          <option>LinkedIn Learning</option>
          <option>FreeCodeCamp</option>
          <option>Pluralsight</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="active">Active</option>
          <option value="paused">Paused</option>
          <option value="done">Completed</option>
        </select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Modules done</label>
        <input type="number" id="f-mdone" min="0" value="0" />
      </div>
      <div class="field">
        <label>Total modules</label>
        <input type="number" id="f-mtotal" min="1" value="10" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Deadline (optional)</label>
        <input type="date" id="f-deadline" />
      </div>
      <div class="field">
        <label>Weekly goal (hours)</label>
        <input type="number" id="f-goal" min="0" step="0.5" value="3" />
      </div>
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="What to focus on, resources, thoughts…"></textarea>
    </div>

    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveCourse()">Add course</button>
    </div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let courses = JSON.parse(localStorage.getItem('study-courses') || '[]');
  let editId = null;

  function persist() {
    localStorage.setItem('study-courses', JSON.stringify(courses));
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + tab).classList.add('active');
    if (tab === 'weekly') renderWeekly();
  }

  // ── Modal ──────────────────────────────────────────────────────────────────
  function openModal(id) {
    editId = id || null;
    const title = document.getElementById('modal-title');
    const saveBtn = document.getElementById('save-btn');

    if (id) {
      const c = courses.find(x => x.id === id);
      document.getElementById('f-name').value     = c.name;
      document.getElementById('f-platform').value = c.platform;
      document.getElementById('f-status').value   = c.status;
      document.getElementById('f-mdone').value    = c.mdone;
      document.getElementById('f-mtotal').value   = c.mtotal;
      document.getElementById('f-deadline').value = c.deadline || '';
      document.getElementById('f-goal').value     = c.goal || 3;
      document.getElementById('f-notes').value    = c.notes || '';
      title.textContent   = 'Edit course';
      saveBtn.textContent = 'Save changes';
    } else {
      document.getElementById('f-name').value     = '';
      document.getElementById('f-platform').value = 'Coursera';
      document.getElementById('f-status').value   = 'active';
      document.getElementById('f-mdone').value    = 0;
      document.getElementById('f-mtotal').value   = 10;
      document.getElementById('f-deadline').value = '';
      document.getElementById('f-goal').value     = 3;
      document.getElementById('f-notes').value    = '';
      title.textContent   = 'Add new course';
      saveBtn.textContent = 'Add course';
    }

    document.getElementById('modal-bg').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  }

  // ── Save course ────────────────────────────────────────────────────────────
  function saveCourse() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) {
      document.getElementById('f-name').focus();
      return;
    }

    const c = {
      id:            editId || Date.now().toString(),
      name,
      platform:      document.getElementById('f-platform').value,
      status:        document.getElementById('f-status').value,
      mdone:         parseInt(document.getElementById('f-mdone').value) || 0,
      mtotal:        Math.max(1, parseInt(document.getElementById('f-mtotal').value) || 1),
      deadline:      document.getElementById('f-deadline').value,
      goal:          parseFloat(document.getElementById('f-goal').value) || 3,
      notes:         document.getElementById('f-notes').value.trim(),
      hoursThisWeek: editId ? (courses.find(x => x.id === editId) || {}).hoursThisWeek || 0 : 0,
      createdAt:     editId ? (courses.find(x => x.id === editId) || {}).createdAt || new Date().toISOString() : new Date().toISOString(),
    };

    if (editId) {
      courses = courses.map(x => x.id === editId ? c : x);
    } else {
      courses.push(c);
    }

    persist();
    closeModal();
    render();
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  function deleteCourse(id) {
    if (!confirm('Remove this course? This cannot be undone.')) return;
    courses = courses.filter(x => x.id !== id);
    persist();
    render();
  }

  // ── Notes ──────────────────────────────────────────────────────────────────
  function toggleNotes(id) {
    document.getElementById('notes-' + id)?.classList.toggle('open');
    document.getElementById('notese-' + id)?.classList.remove('open');
    document.getElementById('notesave-' + id)?.classList.remove('open');
  }

  function editNotes(id) {
    const c = courses.find(x => x.id === id);
    const ta = document.getElementById('notese-' + id);
    ta.value = c.notes || '';
    document.getElementById('notes-' + id)?.classList.remove('open');
    ta.classList.add('open');
    document.getElementById('notesave-' + id)?.classList.add('open');
    ta.focus();
  }

  function saveNotes(id) {
    const ta = document.getElementById('notese-' + id);
    const c = courses.find(x => x.id === id);
    if (c) { c.notes = ta.value.trim(); persist(); }
    const nb = document.getElementById('notes-' + id);
    if (nb) {
      nb.textContent = c.notes || 'No notes yet.';
      if (c.notes) nb.classList.add('open');
    }
    ta.classList.remove('open');
    document.getElementById('notesave-' + id)?.classList.remove('open');
  }

  // ── Deadline label ─────────────────────────────────────────────────────────
  function deadlineLabel(dl) {
    if (!dl) return '';
    const d    = new Date(dl);
    const diff = Math.ceil((d - new Date()) / 86400000);
    if (diff < 0)  return '<span class="deadline soon">Overdue</span>';
    if (diff <= 7) return `<span class="deadline soon">Due in ${diff} day${diff === 1 ? '' : 's'}</span>`;
    return `<span class="deadline">Due ${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>`;
  }

  // ── Render courses ─────────────────────────────────────────────────────────
  function render() {
    const list   = document.getElementById('course-list');
    const total  = courses.length;
    const active = courses.filter(c => c.status === 'active').length;
    const avg    = total
      ? Math.round(courses.reduce((s, c) => s + Math.min(100, Math.round(c.mdone / c.mtotal * 100)), 0) / total)
      : 0;

    document.getElementById('m-total').textContent = total;
    document.getElementById('m-active').textContent = active;
    document.getElementById('m-avg').textContent = avg + '%';
    document.getElementById('subtitle').textContent = total
      ? `${total} course${total === 1 ? '' : 's'} tracked across platforms`
      : 'Start adding your courses below';

    if (!total) {
      list.innerHTML = `<div class="empty">
        <i class="ti ti-books"></i>
        No courses yet.<br>Hit "Add course" to get started.
      </div>`;
      return;
    }

    const badgeClass = { active: 'badge-active', paused: 'badge-paused', done: 'badge-done' };
    const badgeLabel = { active: 'Active', paused: 'Paused', done: 'Completed' };

    list.innerHTML = courses.map(c => {
      const pct = Math.min(100, Math.round(c.mdone / c.mtotal * 100));
      return `
      <div class="course-card">
        <div class="course-top">
          <div>
            <div class="course-title">${escHtml(c.name)}</div>
            <div class="course-meta">
              <span class="platform-tag">${escHtml(c.platform)}</span>
            </div>
          </div>
          <span class="badge ${badgeClass[c.status] || 'badge-active'}">${badgeLabel[c.status] || c.status}</span>
        </div>

        <div class="progress-row">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="progress-pct">${pct}%</span>
        </div>

        <div class="modules-row">
          <i class="ti ti-layout-list"></i>
          ${c.mdone} / ${c.mtotal} modules &nbsp;·&nbsp; Goal: ${c.goal}h/week
        </div>

        <div class="course-footer">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            ${deadlineLabel(c.deadline)}
            <button class="notes-toggle" onclick="toggleNotes('${c.id}')">
              <i class="ti ti-notes" style="font-size:13px"></i> Notes
            </button>
            <button class="notes-toggle" onclick="editNotes('${c.id}')">
              <i class="ti ti-pencil" style="font-size:13px"></i> Edit notes
            </button>
          </div>
          <div class="course-actions">
            <button class="icon-btn" title="Edit course" onclick="openModal('${c.id}')">
              <i class="ti ti-edit"></i>
            </button>
            <button class="icon-btn" title="Delete course" onclick="deleteCourse('${c.id}')">
              <i class="ti ti-trash"></i>
            </button>
          </div>
        </div>

        <div class="notes-box${c.notes ? ' open' : ''}" id="notes-${c.id}">${escHtml(c.notes || 'No notes yet.')}</div>
        <textarea class="notes-edit" id="notese-${c.id}" placeholder="Write your notes here…"></textarea>
        <div class="notes-save-row" id="notesave-${c.id}">
          <button class="btn btn-primary" onclick="saveNotes('${c.id}')">Save notes</button>
          <button class="btn" onclick="toggleNotes('${c.id}')">Cancel</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── Render weekly ──────────────────────────────────────────────────────────
  function renderWeekly() {
    const list   = document.getElementById('week-list');
    const active = courses.filter(c => c.status === 'active');

    if (!active.length) {
      list.innerHTML = `<div class="empty">
        <i class="ti ti-calendar-stats"></i>
        No active courses.<br>Set a course to "Active" to track weekly hours here.
      </div>`;
      return;
    }

    list.innerHTML = active.map(c => {
      const pct = c.goal > 0 ? Math.min(100, Math.round((c.hoursThisWeek || 0) / c.goal * 100)) : 0;
      const done = pct >= 100;
      return `
      <div class="week-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
          <div>
            <div class="week-title">${escHtml(c.name)}</div>
            <div class="week-sub">
              <span class="platform-tag">${escHtml(c.platform)}</span>
              &nbsp;·&nbsp; Weekly goal: <strong>${c.goal}h</strong>
            </div>
          </div>
          <span style="font-size:14px;font-weight:500;color:${done ? 'var(--success-text)' : 'var(--text-secondary)'};">
            ${c.hoursThisWeek || 0}h / ${c.goal}h
            ${done ? ' <i class="ti ti-circle-check" style="font-size:15px;vertical-align:-2px"></i>' : ''}
          </span>
        </div>

        <div class="progress-row" style="margin-bottom:10px">
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%;background:${done ? 'var(--success-text)' : 'var(--accent)'}"></div>
          </div>
          <span class="progress-pct">${pct}%</span>
        </div>

        <div class="week-row">
          <label for="wh-${c.id}">Hours studied this week:</label>
          <input type="number" id="wh-${c.id}" min="0" step="0.5"
            value="${c.hoursThisWeek || 0}"
            onchange="logHours('${c.id}', this.value)" />
        </div>
      </div>`;
    }).join('');
  }

  function logHours(id, val) {
    const c = courses.find(x => x.id === id);
    if (c) { c.hoursThisWeek = Math.max(0, parseFloat(val) || 0); persist(); renderWeekly(); }
  }

  // ── Export / Import ────────────────────────────────────────────────────────
  function exportData() {
    const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), courses }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `study-tracker-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function importData() {
    document.getElementById('import-input').click();
  }

  function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        const imported = data.courses || data;
        if (!Array.isArray(imported)) throw new Error('Invalid format');
        if (!confirm(`Import ${imported.length} course(s)? This will replace your current data.`)) return;
        courses = imported;
        persist();
        render();
        alert('Import successful!');
      } catch {
        alert('Could not read file. Make sure it is a valid Study Tracker JSON export.');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // ── Utilities ──────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── Keyboard shortcut: Escape closes modal ─────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
